    Идею наряжать рождественское дерево (нем. Weihnachtsbaum) привезли в Петербург со своей родины немцы. По некоторым сведениям, принцесса Шарлотта Прусская, ставшая супругой Николая I Александрой Фёдоровной, вскоре после приезда в Россию в 1817 году стала устраивать ёлки для детей, но это были домашние камерные праздники. Первое упоминание в печати о немецком обычае поздравления детей встречается накануне наступления 1840 года в газете «Северная пчела», которую издавал Фаддей Булгарин. «Рождественское дерево» в России вскоре стали называть просто ёлкой.
    Важную роль в популяризации ёлок сыграло педагогическое руководство «Ёлка. Подарок на Рождество», вышедшее в 1845 году. В. Г. Белинский назвал его «решительно первой хорошей книгой в этом роде». Автор пособия Анна Дараган посвятила его августейшим детям: «В праздник Рождества Христова на ёлку вешают конфеты, груши, яблоки, золочёные орехи, пряники и дарят всё это добрым детям. Кругом ёлки будут гореть свечки голубые, красные, зелёные и белые. Под ёлкой на большом столе, накрытом белой скатертью, будут лежать разные игрушки: солдаты, барабан, лошадки для мальчиков; а для девочек коробка с кухонной посудой, рабочий ящик и кукла с настоящими волосами. Прилежным детям, которые любят читать, подарят книгу с разными картинами. Смотрите, дети! Старайтесь заслужить такую прекрасную ёлку».
    Первая ёлка для публики в Санкт-Петербурге была установлена на Рождество 1852 года. Дворяне, купцы и промышленники стали регулярно устраивать новогодние праздники для детей. С тех пор пути ели и ёлки в русском языке разошлись: ель осталась названием дерева, а у ёлки появилось по меньшей мере два новых значения: предметное («наряженное к празднику дерево с огнями и игрушками») и событийное («детский праздник с подарками»). Прилагательные, образованные от ели и ёлки, разошлись ещё дальше: про растение, его запах, иголки, древесину можно сказать только еловый (ёлочные ветки, лапник и хвоя встречаются крайне редко), а про <…>, что относится к празднику, — только ёлочный.
    
