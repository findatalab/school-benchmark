- id: 9
  question: |
    Найдите все значения \( a \), при каждом из которых система уравнений
    \(
    \begin{cases}
    x^2 + y^2 = 6x + 8y - 9 \\
    x^2 + y^2 = a^2
    \end{cases}
    \)
    имеет ровно два различных решения.
  reference: "https://math-ege.sdamgia.ru/problem?id=683394"
  level: Сложный
  answer: |
    \((-9; 1) \cup (1; 9)\)

- id: 10
  question: |
    На доске написано более 36, но менее 48 целых чисел. Среднее арифметическое этих чисел равно -5, среднее арифметическое всех положительных из них равно 6, а среднее арифметическое всех отрицательных из них равно -12.
    а) Сколько чисел написано на доске?
    б) Каких чисел написано больше: положительных или отрицательных?
    в) Какое наибольшее количество положительных чисел может быть среди них?
  reference: "https://math-ege.sdamgia.ru/problem?id=484672"
  level: Сложный
  answer: |
    а) 42; б) отрицательных; в) 15.