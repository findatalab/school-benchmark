- id: 2
  question: |
    На конференцию приехали 5 учёных из Австрии, 4 из Германии и 6 из Сербии. Каждый из них делает на конференции один доклад. Порядок докладов определяется жеребьёвкой. Найдите вероятность того, что десятым окажется доклад учёного из Сербии.
  reference: "https://math-ege.sdamgia.ru/problem?id=517209"
